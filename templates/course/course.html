<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课程</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='course/course.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-star"></i>
            </div>
            <div class="sidebar-nav">
                <a href="{{ url_for('main.main') }}" class="nav-item">
                    <i class="fas fa-home"></i>
                </a>
                <a href="{{ url_for('calendar.calendar') }}" class="nav-item">
                    <i class="fas fa-calendar-alt"></i>
                </a>
                <a href="{{url_for('course.course')}}" class="nav-item active">
                    <i class="fas fa-book"></i>
                </a>
                <a href="{{url_for('users.users')}}" class="nav-item">
                    <i class="fas fa-users"></i>
                </a>
                <a href="{{url_for('stats.stats')}}" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                </a>
                <a href="{{ url_for('settings.settings') }}" class="nav-item">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
            <div class="sidebar-bottom">
                <a href="{{ url_for('login.logout') }}" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索课程...">
                </div>
                <div class="header-right">
                    <button class="header-btn"><i class="fas fa-th"></i></button>
                    <button class="header-btn"><i class="fas fa-bell"></i></button>
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="course-header">
                    <h2>我的课程</h2>
                    <div class="course-tabs">
                        <span class="tab active">全部</span>
                        <span class="tab">进行中</span>
                        <span class="tab">已完成</span>
                    </div>
                </div>

                <div class="course-grid">
                    <div class="course-card">
                        <div class="course-cover" style="background: linear-gradient(135deg, #7f3fff, #5a2dcc);">
                            <i class="fas fa-palette"></i>
                        </div>
                        <div class="course-info">
                            <h3>UI设计入门</h3>
                            <p>从零基础到掌握UI设计</p>
                            <div class="course-meta">
                                <span><i class="fas fa-clock"></i> 120h</span>
                                <span><i class="fas fa-user"></i> 856人学习</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress" style="width: 65%;"></div>
                            </div>
                            <span class="progress-text">已学习 65%</span>
                        </div>
                    </div>

                    <div class="course-card">
                        <div class="course-cover" style="background: linear-gradient(135deg, #00b894, #00856a);">
                            <i class="fas fa-code"></i>
                        </div>
                        <div class="course-info">
                            <h3>Python编程</h3>
                            <p>Python基础与进阶</p>
                            <div class="course-meta">
                                <span><i class="fas fa-clock"></i> 80h</span>
                                <span><i class="fas fa-user"></i> 1230人学习</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress" style="width: 30%;"></div>
                            </div>
                            <span class="progress-text">已学习 30%</span>
                        </div>
                    </div>

                    <div class="course-card">
                        <div class="course-cover" style="background: linear-gradient(135deg, #f8d351, #d4a818);">
                            <i class="fas fa-paint-brush"></i>
                        </div>
                        <div class="course-info">
                            <h3>插画设计</h3>
                            <p>数字插画创作技巧</p>
                            <div class="course-meta">
                                <span><i class="fas fa-clock"></i> 60h</span>
                                <span><i class="fas fa-user"></i> 520人学习</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress" style="width: 85%;"></div>
                            </div>
                            <span class="progress-text">已学习 85%</span>
                        </div>
                    </div>

                    <div class="course-card add-card">
                        <i class="fas fa-plus"></i>
                        <span>添加课程</span>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
