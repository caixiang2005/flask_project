<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='users/users.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-star"></i>
            </div>
            <div class="sidebar-nav">
                <a href="{{ url_for('main.main') }}" class="nav-item">
                    <i class="fas fa-home"></i>
                </a>
                <a href="{{url_for('calendar.calendar')}}" class="nav-item">
                    <i class="fas fa-calendar-alt"></i>
                </a>
                <a href="{{url_for('course.course')}}" class="nav-item">
                    <i class="fas fa-book"></i>
                </a>
                <a href="{{url_for('users.users')}}" class="nav-item active">
                    <i class="fas fa-users"></i>
                </a>
                <a href="{{url_for('stats.stats')}}" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                </a>
                <a href="{{ url_for('settings.settings') }}" class="nav-item">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
            <div class="sidebar-bottom">
                <a href="{{ url_for('login.logout') }}" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索用户...">
                </div>
                <div class="header-right">
                    <button class="header-btn"><i class="fas fa-th"></i></button>
                    <button class="header-btn"><i class="fas fa-bell"></i></button>
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="users-header">
                    <h2>用户列表</h2>
                    <button class="add-btn"><i class="fas fa-plus"></i> 添加用户</button>
                </div>

                <div class="users-stats">
                    <div class="stat-card">
                        <i class="fas fa-users"></i>
                        <div class="stat-info">
                            <span class="stat-num">1,234</span>
                            <span class="stat-label">总用户数</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-user-plus"></i>
                        <div class="stat-info">
                            <span class="stat-num">56</span>
                            <span class="stat-label">本月新增</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-user-check"></i>
                        <div class="stat-info">
                            <span class="stat-num">890</span>
                            <span class="stat-label">活跃用户</span>
                        </div>
                    </div>
                </div>

                <div class="users-table">
                    <div class="table-header">
                        <span>用户</span>
                        <span>邮箱</span>
                        <span>角色</span>
                        <span>状态</span>
                        <span>操作</span>
                    </div>
                    <div class="table-row">
                        <div class="user-cell">
                            <div class="avatar" style="background: #7f3fff;">张</div>
                            <span>张三</span>
                        </div>
                        <span>zhangsan@email.com</span>
                        <span class="role">管理员</span>
                        <span class="status active">在线</span>
                        <div class="actions">
                            <button class="btn-icon"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="table-row">
                        <div class="user-cell">
                            <div class="avatar" style="background: #00b894;">李</div>
                            <span>李四</span>
                        </div>
                        <span>lisi@email.com</span>
                        <span class="role">教师</span>
                        <span class="status active">在线</span>
                        <div class="actions">
                            <button class="btn-icon"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="table-row">
                        <div class="user-cell">
                            <div class="avatar" style="background: #f8d351;">王</div>
                            <span>王五</span>
                        </div>
                        <span>wangwu@email.com</span>
                        <span class="role">学生</span>
                        <span class="status offline">离线</span>
                        <div class="actions">
                            <button class="btn-icon"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="table-row">
                        <div class="user-cell">
                            <div class="avatar" style="background: #f79358;">赵</div>
                            <span>赵六</span>
                        </div>
                        <span>zhaoliu@email.com</span>
                        <span class="role">学生</span>
                        <span class="status active">在线</span>
                        <div class="actions">
                            <button class="btn-icon"><i class="fas fa-edit"></i></button>
                            <button class="btn-icon"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
