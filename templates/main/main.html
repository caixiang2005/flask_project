<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主界面</title>
    
    <!-- 引入FontAwesome图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- 引入自定义样式表 -->
    <link rel="stylesheet" href="{{ url_for('static', filename='main/main.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <!-- 左侧导航栏 -->
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-star"></i>
            </div>
            <div class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <i class="fas fa-home"></i>
                </a>
                <a href="{{url_for('calendar.calendar')}}" class="nav-item">
                    <i class="fas fa-calendar-alt"></i>
                </a>
                <a href="{{url_for('course.course')}}" class="nav-item">
                    <i class="fas fa-book"></i>
                </a>
                <a href="{{url_for('users.users')}}" class="nav-item">
                    <i class="fas fa-users"></i>
                </a>
                <a href="{{url_for('stats.stats')}}" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                </a>
                <a href="{{url_for('settings.settings')}}" class="nav-item">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
            <div class="sidebar-bottom">
                <a href="{{url_for('login.logout')}}" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </nav>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 顶部导航 -->
            <header class="top-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索...">
                </div>
                <div class="header-right">
                    <button class="header-btn">
                        <i class="fas fa-th"></i>
                    </button>
                    <button class="header-btn">
                        <i class="fas fa-bell"></i>
                    </button>
                    <div class="user-avatar">
                        <i class="fas fa-user-circle"></i>
                    </div>
                </div>
            </header>

            <!-- 内容区域 -->
            <div class="content-wrapper">
                <!-- 顶部卡片区 -->
                <div class="cards-grid">
                    <!-- 主卡片 -->
                    <div class="card card-primary">
                        <div class="card-header">
                            <span>阅读更多</span>
                            <i class="fas fa-clock"></i>
                        </div>
                        <h2>课程内容即将<br>更新上线</h2>
                        <div class="card-image">
                            <i class="fas fa-rocket"></i>
                        </div>
                    </div>

                    <!-- 统计卡片 -->
                    <div class="card card-stat">
                        <div class="card-header">
                            <span>学习统计</span>
                            <i class="fas fa-info-circle"></i>
                        </div>
                        <div class="stat-value">28h</div>
                        <div class="stat-chart">
                            <i class="fas fa-chart-line"></i>
                        </div>
                    </div>

                    <!-- 优惠卡片 -->
                    <div class="card card-promo">
                        <div class="card-header">
                            <i class="fas fa-star"></i>
                        </div>
                        <p>即日起至<br>选择优惠课程<br>前50名学员<br>将获得专属礼包</p>
                        <div class="promo-avatars">
                            <i class="fas fa-user-circle"></i>
                            <i class="fas fa-user-circle"></i>
                            <i class="fas fa-user-circle"></i>
                        </div>
                    </div>

                    <!-- 进度卡片 -->
                    <div class="card card-progress">
                        <div class="card-header">
                            <span>作业进度</span>
                            <i class="fas fa-check-circle"></i>
                        </div>
                        <div class="progress-value">+75%</div>
                    </div>

                    <!-- 添加按钮 -->
                    <div class="card card-add">
                        <i class="fas fa-plus"></i>
                    </div>
                </div>

                <!-- 课程列表区 -->
                <div class="courses-section">
                    <div class="section-header">
                        <h3>近期课程 - 选择你感兴趣的</h3>
                    </div>
                    <div class="courses-list">
                        <!-- 课程项 1 -->
                        <div class="course-item">
                            <div class="course-icon">
                                <i class="fas fa-palette"></i>
                            </div>
                            <div class="course-info">
                                <div class="course-name">UI设计入门</div>
                                <div class="course-tags">
                                    <span class="tag tag-hot">热门</span>
                                </div>
                            </div>
                            <div class="course-date">2026.03.15</div>
                            <div class="course-hours">120h</div>
                            <button class="view-btn">查看详情</button>
                        </div>

                        <!-- 课程项 2 -->
                        <div class="course-item">
                            <div class="course-icon">
                                <i class="fas fa-code"></i>
                            </div>
                            <div class="course-info">
                                <div class="course-name">Python编程</div>
                                <div class="course-tags">
                                    <span class="tag tag-new">新课</span>
                                </div>
                            </div>
                            <div class="course-date">2026.03.20</div>
                            <div class="course-hours">80h</div>
                            <button class="view-btn">查看详情</button>
                        </div>

                        <!-- 课程项 3 -->
                        <div class="course-item">
                            <div class="course-icon">
                                <i class="fas fa-paint-brush"></i>
                            </div>
                            <div class="course-info">
                                <div class="course-name">插画设计</div>
                                <div class="course-tags">
                                    <span class="tag tag-basic">基础</span>
                                </div>
                            </div>
                            <div class="course-date">2026.03.25</div>
                            <div class="course-hours">60h</div>
                            <button class="view-btn">查看详情</button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
