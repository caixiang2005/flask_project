<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日历</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='calendar/calendar.css') }}">
</head>
<body>
    <div class="dashboard-container">
        <nav class="sidebar">
            <div class="sidebar-logo">
                <i class="fas fa-star"></i>
            </div>
            <div class="sidebar-nav">
                <a href="{{ url_for('main.main') }}" class="nav-item">
                    <i class="fas fa-home"></i>
                </a>
                <a href="{{ url_for('calendar.calendar') }}" class="nav-item active">
                    <i class="fas fa-calendar-alt"></i>
                </a>
                <a href="{{url_for('course.course')}}" class="nav-item">
                    <i class="fas fa-book"></i>
                </a>
                <a href="{{url_for('users.users')}}" class="nav-item">
                    <i class="fas fa-users"></i>
                </a>
                <a href="{{url_for('stats.stats')}}" class="nav-item">
                    <i class="fas fa-chart-pie"></i>
                </a>
                <a href="{{ url_for('settings.settings') }}" class="nav-item">
                    <i class="fas fa-cog"></i>
                </a>
            </div>
            <div class="sidebar-bottom">
                <a href="{{ url_for('login.logout') }}" class="nav-item">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            </div>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="搜索...">
                </div>
                <div class="header-right">
                    <button class="header-btn"><i class="fas fa-th"></i></button>
                    <button class="header-btn"><i class="fas fa-bell"></i></button>
                    <div class="user-avatar"><i class="fas fa-user-circle"></i></div>
                </div>
            </header>

            <div class="content-wrapper">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button class="nav-btn"><i class="fas fa-chevron-left"></i></button>
                        <h2>2026年3月</h2>
                        <button class="nav-btn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div class="calendar-grid">
                        <div class="weekday">日</div>
                        <div class="weekday">一</div>
                        <div class="weekday">二</div>
                        <div class="weekday">三</div>
                        <div class="weekday">四</div>
                        <div class="weekday">五</div>
                        <div class="weekday">六</div>
                        <div class="day">1</div>
                        <div class="day">2</div>
                        <div class="day">3</div>
                        <div class="day">4</div>
                        <div class="day">5</div>
                        <div class="day">6</div>
                        <div class="day">7</div>
                        <div class="day">8</div>
                        <div class="day">9</div>
                        <div class="day">10</div>
                        <div class="day">11</div>
                        <div class="day">12</div>
                        <div class="day">13</div>
                        <div class="day">14</div>
                        <div class="day">15</div>
                        <div class="day">16</div>
                        <div class="day">17</div>
                        <div class="day">18</div>
                        <div class="day">19</div>
                        <div class="day">20</div>
                        <div class="day">21</div>
                        <div class="day">22</div>
                        <div class="day">23</div>
                        <div class="day">24</div>
                        <div class="day">25</div>
                        <div class="day">26</div>
                        <div class="day">27</div>
                        <div class="day">28</div>
                        <div class="day">29</div>
                        <div class="day">30</div>
                        <div class="day">31</div>
                    </div>
                </div>

                <div class="events-section">
                    <h3>近期事件</h3>
                    <div class="event-item">
                        <div class="event-date">
                            <span class="day-num">15</span>
                            <span class="month">3月</span>
                        </div>
                        <div class="event-info">
                            <h4>UI设计课程开课</h4>
                            <p>上午 10:00 - 12:00</p>
                        </div>
                    </div>
                    <div class="event-item">
                        <div class="event-date">
                            <span class="day-num">20</span>
                            <span class="month">3月</span>
                        </div>
                        <div class="event-info">
                            <h4>Python编程直播</h4>
                            <p>下午 14:00 - 16:00</p>
                        </div>
                    </div>
                    <div class="event-item">
                        <div class="event-date">
                            <span class="day-num">25</span>
                            <span class="month">3月</span>
                        </div>
                        <div class="event-info">
                            <h4>插画设计作业截止</h4>
                            <p>截止时间 23:59</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
