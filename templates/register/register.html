<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='register/register.css') }}">
</head>
<body>
    <div class="main-container">
        <div class="characters-section">
            <div class="characters-container">
                <div class="character character-purple">
                    <div class="face">
                        <div class="eyes-row">
                            <div class="eye eye-with-pupil">
                                <div class="pupil"></div>
                            </div>
                            <div class="eye eye-with-pupil">
                                <div class="pupil"></div>
                            </div>
                        </div>
                        <div class="small-mouth"></div>
                    </div>
                </div>
                <div class="character character-black">
                    <div class="face">
                        <div class="eyes-row" style="display: flex; gap: 20px;">
                            <div class="eye eye-big-white">
                                <div class="pupil"></div>
                            </div>
                            <div class="eye eye-big-white">
                                <div class="pupil"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="character character-yellow">
                    <div class="face">
                        <div class="eye eye-small moving-eye"></div>
                        <div class="line-mouth moving-mouth"></div>
                    </div>
                </div>
                <div class="character character-orange">
                    <div class="face">
                        <div class="eyes-row">
                            <div class="eye moving-eye"></div>
                            <div class="eye moving-eye"></div>
                        </div>
                        <div class="big-smile moving-mouth"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="register-section">
            <div class="register-container">
                <div class="register-header">
                    <i class="fas fa-user-plus"></i>
                    <h1>立即注册</h1>
                    <p>加入我们，开始学习之旅</p>
                </div>
                {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                    <div class="error-message">{{ message }}</div>
                    {% endfor %}
                {% endif %}
                {% endwith %}
                <form action="{{ url_for('register.register') }}" method="POST">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" name="username" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" name="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="confirm_password">确认密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="confirm_password" name="confirm_password" placeholder="请再次输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="register-btn">注册</button>
                </form>
                <div class="login-link">
                    已有账号? <a href="{{ url_for('login.login') }}">立即登录</a>
                </div>
            </div>
        </div>
    </div>
    <script src="{{ url_for('static', filename='register/register.js') }}"></script>
</body>
</html>
